---
# =============================================================================
# Role: app — Build da imagem Go e execução via Docker Compose
# =============================================================================

- name: Verificar que o código-fonte da aplicação existe
  ansible.builtin.stat:
    path: "{{ compose_dir }}/app/main.go"
  register: src_check

- name: Falhar se o código-fonte não for encontrado
  ansible.builtin.fail:
    msg: "Código-fonte não encontrado em {{ compose_dir }}/app/main.go"
  when: not src_check.stat.exists

- name: Garantir que diretórios de configuração existem com permissões corretas
  ansible.builtin.file:
    path: "{{ item.path }}"
    state: directory
    mode: "{{ item.mode }}"
    owner: "{{ real_user }}"
  loop:
    - { path: "{{ compose_dir }}/prometheus",                           mode: "0755" }
    - { path: "{{ compose_dir }}/grafana",                              mode: "0755" }
    - { path: "{{ compose_dir }}/grafana/provisioning",                 mode: "0755" }
    - { path: "{{ compose_dir }}/grafana/provisioning/datasources",     mode: "0755" }
    - { path: "{{ compose_dir }}/grafana/provisioning/dashboards",      mode: "0755" }
  become: true

- name: Copiar arquivo prometheus.yml
  ansible.builtin.copy:
    src: "{{ playbook_dir }}/files/prometheus/prometheus.yml"
    dest: "{{ compose_dir }}/prometheus/prometheus.yml"
    mode: "0644"
    owner: "{{ real_user }}"
  become: true

- name: Garantir permissões nos diretórios de provisioning do Grafana
  ansible.builtin.file:
    path: "{{ compose_dir }}/grafana"
    state: directory
    recurse: true
    mode: "0755"
    owner: "{{ real_user }}"
  become: true

- name: Verificar se imagem já existe
  community.docker.docker_image_info:
    name: http-server-projeto-korp:latest
  register: image_info

- name: Build da imagem http-server-projeto-korp
  community.docker.docker_image:
    name: http-server-projeto-korp
    tag: latest
    build:
      path: "{{ compose_dir }}/app"
      dockerfile: Dockerfile
    source: build
    force_source: "{{ image_info.images | length == 0 }}"

- name: Subir todos os containers com Docker Compose
  community.docker.docker_compose_v2:
    project_src: "{{ compose_dir }}"
    files:
      - docker-compose.yml
    state: present
    pull: missing
    build: never

- name: Aguardar aplicação estar respondendo
  ansible.builtin.uri:
    url: "http://localhost:80/health"
    method: GET
    status_code: 200
  register: app_health
  retries: 12
  delay: 5
  until: app_health.status == 200
