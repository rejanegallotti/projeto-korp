---
# =============================================================================
# Role: docker — Instala Docker Engine + Docker Compose Plugin
# Suporta Debian/Ubuntu e RHEL/CentOS/Fedora
# =============================================================================

# ── Debian / Ubuntu ──────────────────────────────────────────────────────────
- name: "[Debian] Instalar dependências de pre-requisito"
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

- name: "[Debian] Criar diretório para chave GPG"
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  when: ansible_os_family == "Debian"

- name: "[Debian] Adicionar chave GPG oficial do Docker"
  ansible.builtin.shell: |
    curl -fsSL https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg \
      | gpg --dearmor -o /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
  when: ansible_os_family == "Debian"

- name: "[Debian] Adicionar repositório do Docker"
  ansible.builtin.shell: |
    echo \
      "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.gpg] \
      https://download.docker.com/linux/{{ ansible_distribution | lower }} \
      $(lsb_release -cs) stable" \
      | tee /etc/apt/sources.list.d/docker.list > /dev/null
  args:
    creates: /etc/apt/sources.list.d/docker.list
  when: ansible_os_family == "Debian"

- name: "[Debian] Instalar Docker Engine + Compose Plugin"
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  when: ansible_os_family == "Debian"

# ── RHEL / CentOS / Fedora ───────────────────────────────────────────────────
- name: "[RHEL] Instalar yum-utils"
  ansible.builtin.yum:
    name: yum-utils
    state: present
  when: ansible_os_family == "RedHat"

- name: "[RHEL] Adicionar repositório do Docker"
  ansible.builtin.command: >
    yum-config-manager --add-repo
    https://download.docker.com/linux/centos/docker-ce.repo
  args:
    creates: /etc/yum.repos.d/docker-ce.repo
  when: ansible_os_family == "RedHat"

- name: "[RHEL] Instalar Docker Engine + Compose Plugin"
  ansible.builtin.yum:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
  when: ansible_os_family == "RedHat"

# ── Comum ────────────────────────────────────────────────────────────────────
- name: Garantir que o serviço Docker está habilitado e em execução
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started

- name: Adicionar usuário atual ao grupo docker (evitar uso de sudo)
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: true
  when: ansible_user_id != "root"


- name: Verificar versão do Docker instalada
  ansible.builtin.command: docker --version
  register: docker_version
  changed_when: false

- name: Exibir versão do Docker
  ansible.builtin.debug:
    msg: "Docker instalado: {{ docker_version.stdout }}"
