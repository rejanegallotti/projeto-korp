---
# =============================================================================
# Role: docker — Instala Docker Engine + Docker Compose Plugin
# Suporta Debian/Ubuntu e RHEL/CentOS/Fedora
# =============================================================================

- name: "[Debian] Instalar dependências de pre-requisito"
  ansible.builtin.apt:
    name:
      - ca-certificates
      - curl
      - gnupg
      - lsb-release
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: "[Debian] Criar diretório para chave GPG"
  ansible.builtin.file:
    path: /etc/apt/keyrings
    state: directory
    mode: "0755"
  become: true
  when: ansible_os_family == "Debian"

- name: "[Debian] Baixar chave GPG oficial do Docker"
  ansible.builtin.get_url:
    url: "https://download.docker.com/linux/{{ ansible_distribution | lower }}/gpg"
    dest: /tmp/docker.gpg
    mode: "0644"
    force: false
  become: true
  when: ansible_os_family == "Debian"

- name: "[Debian] Converter e instalar chave GPG do Docker"
  ansible.builtin.shell: |
    gpg --dearmor < /tmp/docker.gpg > /etc/apt/keyrings/docker.gpg
    chmod a+r /etc/apt/keyrings/docker.gpg
  args:
    creates: /etc/apt/keyrings/docker.gpg
  become: true
  when: ansible_os_family == "Debian"

- name: "[Debian] Adicionar repositório oficial do Docker"
  ansible.builtin.apt_repository:
    repo: >-
      deb [arch={{ ansible_architecture }}
      signed-by=/etc/apt/keyrings/docker.gpg]
      https://download.docker.com/linux/{{ ansible_distribution | lower }}
      {{ ansible_distribution_release }} stable
    state: present
    filename: docker
  become: true
  when: ansible_os_family == "Debian"

- name: "[Debian] Instalar Docker Engine + Compose Plugin"
  ansible.builtin.apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-buildx-plugin
      - docker-compose-plugin
    state: present
    update_cache: true
  become: true
  when: ansible_os_family == "Debian"

- name: "[RHEL] Instalar yum-utils"
  ansible.builtin.yum:
    name: yum-utils
    state: present
  become: true
  when: ansible_os_family == "RedHat"

- name: "[RHEL] Adicionar repositório do Docker"
  ansible.builtin.command: >
    yum-config-manager --add-repo
    https://download.docker.com/linux/centos/docker-ce.repo
  args:
    creates: /etc/yum.repos.d/docker-ce.repo
  become: true
  when: ansible_os_family == "RedHat"

- name: "[RHEL] Instalar Docker Engine + Compose Plugin"
  ansible.builtin.yum:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
  become: true
  when: ansible_os_family == "RedHat"

- name: Garantir que o serviço Docker está habilitado e em execução
  ansible.builtin.systemd:
    name: docker
    enabled: true
    state: started
  become: true

- name: Adicionar usuário atual ao grupo docker (evitar uso de sudo)
  ansible.builtin.user:
    name: "{{ ansible_user_id }}"
    groups: docker
    append: true
  become: true
  when: ansible_user_id != "root"

- name: Verificar versão do Docker instalada
  ansible.builtin.command: docker --version
  register: docker_version
  changed_when: false

- name: Verificar versão mínima do Docker (24.0+)
  ansible.builtin.assert:
    that:
      - docker_version.stdout is search('Docker version [2-9][4-9]\.')
        or docker_version.stdout is search('Docker version [3-9][0-9]\.')
    fail_msg: "Versão do Docker abaixo do mínimo requerido (24.0). Encontrado: {{ docker_version.stdout }}"
    success_msg: "Versão do Docker OK: {{ docker_version.stdout }}"

- name: Exibir versão do Docker
  ansible.builtin.debug:
    msg: "Docker instalado: {{ docker_version.stdout }}"
