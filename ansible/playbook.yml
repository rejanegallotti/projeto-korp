---
# =============================================================================
# Playbook: Provisionamento completo do Projeto Korp
# Execução: ansible-playbook -i inventory.ini playbook.yml
# =============================================================================
- name: Provisionamento completo do Projeto Korp
  hosts: local
  vars:
    project_dir: "{{ playbook_dir }}/.."
    compose_dir: "{{ project_dir | realpath }}"
    grafana_admin_password: "admin"   # Em produção: usar Ansible Vault

  pre_tasks:
    - name: Verificar sistema operacional suportado
      ansible.builtin.assert:
        that:
          - ansible_os_family in ["Debian", "RedHat"]
        fail_msg: "SO não suportado: {{ ansible_os_family }}"
        success_msg: "SO suportado: {{ ansible_os_family }} — {{ ansible_distribution }} {{ ansible_distribution_version }}"

    - name: Capturar usuário real 
      ansible.builtin.set_fact:
        real_user: "{{ ansible_env.SUDO_USER | default(ansible_user_id) }}" 

    - name: Exibir informações do ambiente
      ansible.builtin.debug:
        msg:
          - "Host:       {{ inventory_hostname }}"
          - "SO:         {{ ansible_distribution }} {{ ansible_distribution_version }}"
          - "Usuário:    {{ real_user }}"
          - "Diretório:  {{ compose_dir }}"

  roles:
    - role: docker
    - role: app
    - role: monitoring

  post_tasks:
    - name: Aguardar serviço ficar disponível via NGINX (máx 60s)
      ansible.builtin.uri:
        url: "http://localhost:80/projeto-korp"
        method: GET
        status_code: 200
      register: health_check
      retries: 12
      delay: 5
      until: health_check.status == 200

    - name: Exibir resposta do serviço no console
      ansible.builtin.debug:
        msg: |
          ============================================================
          Resposta de http://localhost:80/projeto-korp
          ------------------------------------------------------------
          {{ health_check.json | to_nice_json }}
          ============================================================
          Grafana:    http://localhost:3000  (admin/admin)
          Prometheus: http://localhost:9090
          ============================================================

    - name: Resumo do provisionamento
      ansible.builtin.debug:
        msg:
          - "============================================================"
          - " PROVISIONAMENTO CONCLUÍDO COM SUCESSO"
          - "============================================================"
          - " Containers rodando:"
          - "   http-server-projeto-korp  → porta 8080 (interno)"
          - "   nginx                     → porta 80"
          - "   prometheus                → porta 9090"
          - "   grafana                   → porta 3000"
          - "============================================================"
